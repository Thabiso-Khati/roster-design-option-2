<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Airtel red background -->
  <rect width="80" height="80" rx="14" fill="#ED1C24"/>

  <!-- Airtel wave/swoosh — large organic white shape in the upper portion of the icon -->
  <!-- Approximates the distinctive Airtel brand "gesture" mark -->
  <path d="
    M 10 55
    C 8 48  9 38  16 29
    C 23 20  34 16  46 17
    C 56 18  63 23  62 30
    C 61 37  54 42  46 45
    C 38 48  28 50  22 53
    C 17 56  11 59  10 55 Z
  " fill="white"/>

  <!-- Second highlight arc for depth (like the Airtel inner curve) -->
  <path d="
    M 28 19
    C 38 15  54 16  62 22
    C 68 27  68 34  62 39
    C 56 44  46 46  38 45
    C 30 44  22 40  20 34
    C 18 28  22 21  28 19 Z
  " fill="white" opacity="0.3"/>

  <!-- "airtel" wordmark -->
  <text x="40" y="64" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="12" fill="white" text-anchor="middle" dominant-baseline="middle">airtel</text>
  <!-- "money" subtext -->
  <text x="40" y="74" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="7.5" fill="rgba(255,255,255,0.9)" text-anchor="middle" dominant-baseline="middle" letter-spacing="1.5">money</text>
</svg>
